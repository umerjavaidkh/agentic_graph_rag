<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agentic Graph RAG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root{
      --bg0:#080d18;
      --bg1:#0c1424;
      --surface:#111827;
      --surface-elevated:#151f33;
      --card: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.10);
      --border-strong: rgba(255,255,255,0.16);
      --text:#f1f5f9;
      --text-secondary:#94a3b8;
      --text-muted:#64748b;
      --accent:#3b82f6;
      --accent-soft:rgba(59,130,246,0.15);
      --accent-glow:rgba(59,130,246,0.35);
      --success:#10b981;
      --danger:#f87171;
      --shadow: 0 4px 24px rgba(0,0,0,0.4), 0 1px 0 rgba(255,255,255,0.04) inset;
      --shadow-lg: 0 24px 48px rgba(0,0,0,0.45);
      --radius: 14px;
      --radius-sm: 10px;
      --radius-lg: 18px;
      --font-size: 15px;
      --font-size-sm: 13px;
      --font-size-xs: 11.5px;
      --line: 1.6;
      --mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      --sans: "Inter", ui-sans-serif, system-ui, -apple-system, sans-serif;
      --msg-max:  min(720px, 88%);
    }
    *{ box-sizing:border-box; }
    html{ font-size: 16px; -webkit-font-smoothing: antialiased; }
    body{
      margin:0;
      font-family: var(--sans);
      font-size: var(--font-size);
      line-height: var(--line);
      color: var(--text);
      background:
        radial-gradient(ellipse 80% 50% at 20% -10%, rgba(59,130,246,0.12), transparent),
        radial-gradient(ellipse 60% 40% at 90% 10%, rgba(16,185,129,0.08), transparent),
        linear-gradient(165deg, var(--bg0) 0%, var(--bg1) 100%);
      min-height:100vh;
      display:flex;
      align-items:stretch;
      justify-content:center;
      padding: 20px;
    }
    .shell{
      width:min(1180px, 100%);
      display:grid;
      grid-template-columns: 300px 1fr;
      gap: 20px;
      height: calc(100vh - 40px);
      max-height: 920px;
    }
    @media (max-width: 980px){
      .shell{ grid-template-columns: 1fr; }
    }
    .panel{
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      background: var(--surface);
      box-shadow: var(--shadow-lg);
      overflow:hidden;
      display: flex;
      flex-direction: column;
    }
    .panel.sidebar{ min-height: 0; }
    .panel-header{
      padding: 18px 20px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface-elevated);
      flex-shrink: 0;
    }
    .title{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
      margin:0;
      font-size: 1rem;
      font-weight: 600;
    }
    .brand{
      display:flex;
      align-items:center;
      gap: 10px;
      font-weight: 600;
      font-size: 0.9375rem;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    .dot{
      width:8px;height:8px;border-radius:50%;
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent-glow);
    }
    .badge{
      font-size: var(--font-size-xs);
      font-weight: 500;
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      color: var(--text-secondary);
      white-space: nowrap;
    }
    .badge.status-ready{ color: var(--success); border-color: rgba(16,185,129,0.35); }
    .badge.status-busy{ color: var(--accent); border-color: rgba(59,130,246,0.4); }
    .badge.status-error{ color: var(--danger); border-color: rgba(248,113,113,0.35); }
    .content{
      padding: 18px 20px 20px;
      overflow-y: auto;
    }
    label{
      display:block;
      font-size: var(--font-size-xs);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-muted);
      margin: 16px 0 6px;
    }
    label:first-of-type{ margin-top: 0; }
    input[type=text], select{
      width:100%;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: rgba(0,0,0,0.25);
      color: var(--text);
      font-family: var(--sans);
      font-size: var(--font-size-sm);
      outline:none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input[type=text]:focus, select:focus{
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    .hint{
      margin-top: 14px;
      padding: 12px;
      border-radius: var(--radius-sm);
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: var(--font-size-sm);
      line-height: 1.5;
    }
    .hint code{
      font-family: var(--mono);
      font-size: 0.85em;
      color: var(--text);
      background: rgba(0,0,0,0.3);
      padding: 1px 5px;
      border-radius: 4px;
    }
    .btn-row{
      display:flex; gap: 8px; margin-top: 16px;
    }
    button{
      appearance:none;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      padding: 9px 14px;
      border-radius: var(--radius-sm);
      cursor:pointer;
      font-family: var(--sans);
      font-size: var(--font-size-sm);
      font-weight: 500;
      transition: background 0.15s, border-color 0.15s;
    }
    button:hover:not(:disabled){
      background: rgba(255,255,255,0.1);
      border-color: var(--border-strong);
    }
    button.primary{
      border-color: transparent;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
    }
    button.primary:hover:not(:disabled){
      background: #2563eb;
      filter: brightness(1.05);
    }
    button:disabled{
      opacity: 0.5;
      cursor:not-allowed;
    }

    /* Chat */
    .chat{
      display:flex;
      flex-direction:column;
      min-height: 0;
      height: 100%;
    }
    .chat-body{
      padding: 20px 24px;
      flex: 1;
      overflow-y: auto;
      scroll-behavior: smooth;
    }
    .chat-body::-webkit-scrollbar{ width: 8px; }
    .chat-body::-webkit-scrollbar-track{ background: transparent; }
    .chat-body::-webkit-scrollbar-thumb{
      background: rgba(255,255,255,0.12);
      border-radius: 4px;
    }
    .welcome-card{
      max-width: 520px;
      margin: 8px auto 24px;
      padding: 20px 22px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      background: linear-gradient(145deg, rgba(59,130,246,0.08), rgba(255,255,255,0.02));
      text-align: center;
    }
    .welcome-card h3{
      margin: 0 0 8px;
      font-size: 1.125rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .welcome-card p{
      margin: 0;
      font-size: var(--font-size-sm);
      color: var(--text-secondary);
      line-height: 1.55;
    }
    .welcome-examples{
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 14px;
    }
    .example-chip{
      font-size: var(--font-size-xs);
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,0.2);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
    }
    .example-chip:hover{
      border-color: var(--accent);
      color: var(--text);
      background: var(--accent-soft);
    }
    .msg{
      display:flex;
      gap: 12px;
      margin: 20px 0;
      align-items: flex-start;
    }
    .msg.user{
      flex-direction: row-reverse;
    }
    .msg-avatar{
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
    }
    .msg.assistant .msg-avatar{
      background: var(--accent-soft);
      color: var(--accent);
      border: 1px solid rgba(59,130,246,0.25);
    }
    .msg.user .msg-avatar{
      background: rgba(255,255,255,0.08);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .msg-inner{
      max-width: var(--msg-max);
      min-width: 0;
    }
    .msg-label{
      font-size: var(--font-size-xs);
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .msg.user .msg-label{ text-align: right; }
    .bubble{
      padding: 14px 16px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      background: var(--surface-elevated);
      font-size: var(--font-size);
      line-height: var(--line);
      word-wrap: break-word;
      box-shadow: var(--shadow);
    }
    .msg.user .bubble{
      background: linear-gradient(160deg, rgba(59,130,246,0.22), rgba(59,130,246,0.08));
      border-color: rgba(59,130,246,0.35);
    }
    .bubble.plain-text{
      white-space: pre-wrap;
      font-size: var(--font-size);
    }
    .msg.thinking .bubble{
      padding: 12px 16px;
      min-width: 64px;
    }
    .typing-dots{
      display: flex;
      gap: 5px;
      align-items: center;
      height: 20px;
    }
    .typing-dots span{
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: typing 1.2s ease-in-out infinite;
    }
    .typing-dots span:nth-child(2){ animation-delay: 0.15s; }
    .typing-dots span:nth-child(3){ animation-delay: 0.3s; }
    @keyframes typing{
      0%, 60%, 100%{ transform: translateY(0); opacity: 0.4; }
      30%{ transform: translateY(-4px); opacity: 1; }
    }
    .pres-block{ margin: 14px 0; }
    .pres-block:first-child{ margin-top: 0; }
    .pres-block:last-child{ margin-bottom: 0; }
    .pres-img-wrap{
      display: inline-block;
      max-width: min(320px, 85%);
      vertical-align: top;
    }
    .pres-img{
      display: block;
      width: auto;
      height: auto;
      max-width: 100%;
      max-height: 360px;
      object-fit: contain;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      margin: 4px 0;
      cursor: zoom-in;
    }
    .pres-img-wrap .pres-caption{
      margin-top: 6px;
      margin-bottom: 0;
    }
    .pres-caption{
      font-size: var(--font-size-sm);
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .pres-table-wrap{
      overflow-x: auto;
      margin: 10px 0;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
    }
    table.pres-table{
      width: 100%;
      border-collapse: collapse;
      font-size: var(--font-size-sm);
    }
    table.pres-table th, table.pres-table td{
      border-bottom: 1px solid var(--border);
      padding: 10px 12px;
      text-align: left;
    }
    table.pres-table th{
      background: rgba(59,130,246,0.12);
      font-weight: 600;
      font-size: var(--font-size-xs);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: var(--text-secondary);
    }
    table.pres-table tbody tr:last-child td{ border-bottom: none; }
    table.pres-table.interactive th{
      cursor: pointer;
      user-select: none;
    }
    table.pres-table.interactive th:hover{ background: rgba(59,130,246,0.2); }
    table.pres-table.interactive tbody tr:hover{ background: rgba(255,255,255,0.04); }
    table.pres-table tr.row-highlight{ background: var(--accent-soft); }
    /* Wider assistant column when showing charts/tables */
    .msg-inner.has-rich-ui{
      max-width: min(920px, 96%);
    }
    .pres-chart-canvas-wrap{
      position: relative;
      margin: 10px 0;
      padding: 8px 10px 4px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: rgba(0,0,0,0.2);
      width: 100%;
      height: var(--chart-h, 280px);
      min-height: var(--chart-h, 280px);
      box-sizing: border-box;
    }
    .pres-chart-canvas-wrap canvas{
      display: block;
      width: 100% !important;
      height: 100% !important;
    }
    .pres-chart{
      display: flex;
      align-items: flex-end;
      gap: 10px;
      width: 100%;
      min-height: 220px;
      height: 220px;
      margin: 10px 0;
      padding: 14px 14px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: rgba(0,0,0,0.2);
      overflow-x: auto;
      overflow-y: hidden;
      box-sizing: border-box;
    }
    .stream-toggle{
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      margin-top: 8px;
      cursor: pointer;
    }
    .stream-markdown{
      margin-top: 10px;
      white-space: pre-wrap;
    }
    .auth-panel{
      margin-bottom: 14px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }
    .google-signin-slot{
      min-height: 44px;
      display: flex;
      align-items: center;
    }
    .auth-user-chip{
      font-size: var(--font-size-sm);
      color: var(--muted);
      padding: 8px 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      margin-top: 8px;
      word-break: break-all;
    }
    .auth-signout{
      margin-top: 8px;
      width: 100%;
      font-size: var(--font-size-sm);
    }
    .dev-hint{
      color: var(--muted);
      font-weight: normal;
      font-size: 11px;
    }
    .pres-bar-col{
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      min-width: 40px;
      max-width: 80px;
      min-height: 0;
    }
    .pres-bar-value{
      font-size: var(--font-size-xs);
      font-weight: 600;
      color: var(--text);
      text-align: center;
      line-height: 1.25;
      max-width: 100%;
      padding: 0 2px;
      flex-shrink: 0;
    }
    .pres-bar-track{
      width: 100%;
      height: 96px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-top: 8px;
      box-sizing: border-box;
      flex-shrink: 0;
    }
    .pres-bar{
      width: 32px;
      border-radius: 6px 6px 0 0;
      min-height: 3px;
      max-height: 100%;
      transition: height 0.2s ease, filter 0.15s ease;
      cursor: default;
    }
    .pres-bar-col:hover .pres-bar{ filter: brightness(1.15); }
    .pres-bar-col.bar-active .pres-bar{ outline: 2px solid var(--accent); }
    .pres-bar-label{
      font-size: var(--font-size-xs);
      color: var(--text-muted);
      text-align: center;
      line-height: 1.25;
      max-width: 100%;
      padding: 0 2px;
      flex-shrink: 0;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .pres-md h1{ font-size: 1.25rem; margin: 0.75em 0 0.35em; font-weight: 600; }
    .pres-md h2{ font-size: 1.1rem; margin: 0.65em 0 0.3em; font-weight: 600; }
    .pres-md h3{ font-size: 1rem; margin: 0.55em 0 0.25em; font-weight: 600; }
    .pres-md p{ margin: 0.5em 0; color: var(--text); }
    .pres-md ul{ margin: 0.5em 0; padding-left: 1.35em; }
    .pres-md strong{ font-weight: 600; color: var(--text); }
    .meta-row{
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }
    .meta-chip{
      font-size: var(--font-size-xs);
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 6px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      color: var(--text-secondary);
    }
    .meta-chip.accent{
      color: var(--accent);
      border-color: rgba(59,130,246,0.35);
      background: var(--accent-soft);
    }
    details.sources-panel{
      margin-top: 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: rgba(0,0,0,0.2);
      overflow: hidden;
    }
    details.sources-panel summary{
      cursor: pointer;
      padding: 10px 12px;
      font-size: var(--font-size-sm);
      font-weight: 500;
      color: var(--text-secondary);
      list-style: none;
      user-select: none;
    }
    details.sources-panel summary::-webkit-details-marker{ display: none; }
    details.sources-panel summary::before{
      content: '▸ ';
      display: inline-block;
      transition: transform 0.15s;
    }
    details.sources-panel[open] summary::before{ transform: rotate(90deg); }
    details.sources-panel[open] summary{
      border-bottom: 1px solid var(--border);
    }
    .source{
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1.45;
      color: var(--text-secondary);
      padding: 10px 12px;
      border-top: 1px solid var(--border);
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 200px;
      overflow-y: auto;
    }
    .chat-input{
      border-top: 1px solid var(--border);
      padding: 16px 20px;
      background: var(--surface-elevated);
      flex-shrink: 0;
    }
    .input-hint{
      font-size: var(--font-size-xs);
      color: var(--text-muted);
      margin-top: 8px;
      text-align: right;
    }
    .input-hint kbd{
      font-family: var(--mono);
      font-size: 0.95em;
      padding: 1px 5px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,0.25);
    }
    .input-row{
      display:flex;
      gap: 12px;
      align-items:flex-end;
    }
    textarea{
      flex:1;
      min-height: 48px;
      max-height: 160px;
      resize: vertical;
      padding: 12px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: rgba(0,0,0,0.25);
      color: var(--text);
      outline:none;
      line-height: 1.5;
      font-family: var(--sans);
      font-size: var(--font-size);
    }
    textarea::placeholder{ color: var(--text-muted); }
    textarea:focus{
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    #send{
      min-width: 88px;
      padding: 12px 18px;
      height: 48px;
      border-radius: var(--radius);
    }
    .error{
      font-size: var(--font-size-sm);
      color: #fecaca;
      background: rgba(248,113,113,0.12);
      border: 1px solid rgba(248,113,113,0.3);
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      margin: 0 20px;
      flex-shrink: 0;
    }
    @media (max-width: 980px){
      .shell{ height: auto; max-height: none; min-height: calc(100vh - 40px); }
      .chat{ min-height: 70vh; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="panel sidebar">
      <div class="panel-header">
        <h2 class="title">
          <span class="brand"><span class="dot"></span>Graph RAG</span>
        </h2>
      </div>
      <div class="content">
        <div id="auth_panel" class="auth-panel">
          <label>Sign in</label>
          <div id="google_signin" class="google-signin-slot"></div>
          <div id="auth_user_chip" class="auth-user-chip" style="display:none;"></div>
          <button type="button" id="auth_signout" class="auth-signout" style="display:none;">Sign out</button>
        </div>

        <div id="dev_identity" class="dev-identity">
          <label>Role <span class="dev-hint">(dev)</span></label>
          <select id="role">
            <option value="public">public</option>
            <option value="regular_office">regular_office</option>
            <option value="compliance_officer">compliance_officer</option>
            <option value="admin">admin</option>
          </select>

          <label>User ID</label>
          <input id="user_id" type="text" value="public_001" />

          <label>Department</label>
          <input id="department" type="text" placeholder="Optional" />
        </div>

        <label class="stream-toggle">
          <input id="use_stream" type="checkbox" checked />
          Stream responses (NDJSON)
        </label>

        <div class="btn-row">
          <button id="new_chat">New chat</button>
          <button class="primary" id="ping">Health</button>
        </div>

        <div class="hint">
          Use seeded users if you see permission errors:
          <code>public_001</code>, <code>compliance_001</code>, <code>admin_001</code>.
        </div>
      </div>
    </div>

    <div class="panel chat">
      <div class="panel-header">
        <h2 class="title">
          <span class="brand">Assistant</span>
          <span class="badge status-ready" id="status">Ready</span>
        </h2>
      </div>
      <div id="err" class="error" style="display:none;"></div>
      <div id="chat_body" class="chat-body"></div>
      <div class="chat-input">
        <div class="input-row">
          <textarea id="q" placeholder="Ask about documents, products, sales, policies…" spellcheck="true" rows="1"></textarea>
          <button class="primary" id="send" type="button">Send</button>
        </div>
        <div class="input-hint"><kbd>Enter</kbd> send · <kbd>Shift</kbd>+<kbd>Enter</kbd> new line</div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" crossorigin="anonymous"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    const chatBody = document.getElementById('chat_body');
    const q = document.getElementById('q');
    const sendBtn = document.getElementById('send');
    const statusBadge = document.getElementById('status');
    const errBox = document.getElementById('err');

    const AUTH_TOKEN_KEY = 'rag_id_token';
    let authConfig = { enabled: false, google_client_id: '', allow_body_fallback: true };

    function getStoredToken() {
      try { return sessionStorage.getItem(AUTH_TOKEN_KEY) || ''; } catch (_) { return ''; }
    }

    function setStoredToken(token) {
      try {
        if (token) sessionStorage.setItem(AUTH_TOKEN_KEY, token);
        else sessionStorage.removeItem(AUTH_TOKEN_KEY);
      } catch (_) { /* ignore */ }
    }

    function authHeaders(extra) {
      const h = Object.assign({ 'Content-Type': 'application/json' }, extra || {});
      const token = getStoredToken();
      if (token) h['Authorization'] = 'Bearer ' + token;
      return h;
    }

    function parseJwtPayload(token) {
      try {
        const part = token.split('.')[1];
        return JSON.parse(atob(part.replace(/-/g, '+').replace(/_/g, '/')));
      } catch (_) { return null; }
    }

    async function refreshAuthChip() {
      const chip = document.getElementById('auth_user_chip');
      const token = getStoredToken();
      if (!token) return;
      try {
        const res = await fetch('/auth/me', { headers: authHeaders({}) });
        if (res.ok) {
          const me = await res.json();
          const who = me.email || me.user_id || 'user';
          chip.textContent = 'Signed in: ' + who + ' · role: ' + (me.role || '?');
          return;
        }
      } catch (_) { /* fall through */ }
      const payload = parseJwtPayload(token);
      const email = payload && (payload.email || payload.sub);
      chip.textContent = email ? ('Signed in: ' + email) : 'Signed in';
    }

    function updateAuthUI() {
      const panel = document.getElementById('auth_panel');
      const devBox = document.getElementById('dev_identity');
      const chip = document.getElementById('auth_user_chip');
      const signout = document.getElementById('auth_signout');
      const googleSlot = document.getElementById('google_signin');
      const token = getStoredToken();

      if (!authConfig.enabled) {
        panel.style.display = 'none';
        devBox.style.display = 'block';
        return;
      }

      panel.style.display = 'block';

      if (token) {
        // JWT wins on the API — hide dev role/user pickers so they are not misleading.
        devBox.style.display = 'none';
        chip.style.display = 'block';
        signout.style.display = 'block';
        googleSlot.style.display = 'none';
        refreshAuthChip();
      } else {
        chip.style.display = 'none';
        signout.style.display = 'none';
        googleSlot.style.display = 'flex';
        devBox.style.display = authConfig.allow_body_fallback ? 'block' : 'none';
        initGoogleSignIn();
      }
    }

    function handleGoogleCredential(response) {
      if (response && response.credential) {
        setStoredToken(response.credential);
        updateAuthUI();
        setStatus('Signed in');
      }
    }

    function initGoogleSignIn() {
      if (!authConfig.enabled || !authConfig.google_client_id) return;
      if (typeof google === 'undefined' || !google.accounts || !google.accounts.id) {
        setTimeout(initGoogleSignIn, 400);
        return;
      }
      const slot = document.getElementById('google_signin');
      slot.innerHTML = '';
      google.accounts.id.initialize({
        client_id: authConfig.google_client_id,
        callback: handleGoogleCredential,
        auto_select: false,
      });
      google.accounts.id.renderButton(slot, {
        theme: 'outline',
        size: 'large',
        width: 260,
        text: 'signin_with',
      });
    }

    async function loadAuthConfig() {
      try {
        const res = await fetch('/auth/config');
        if (res.ok) authConfig = await res.json();
      } catch (_) { /* dev without auth */ }
      updateAuthUI();
    }

    document.getElementById('auth_signout').addEventListener('click', () => {
      setStoredToken('');
      if (typeof google !== 'undefined' && google.accounts && google.accounts.id) {
        google.accounts.id.disableAutoSelect();
      }
      updateAuthUI();
      setStatus('Signed out');
    });

    loadAuthConfig();

    let thinkingEl = null;

    function setStatus(text) {
      statusBadge.textContent = text;
      statusBadge.classList.remove('status-ready', 'status-busy', 'status-error');
      if (/think|check/i.test(text)) statusBadge.classList.add('status-busy');
      else if (/error/i.test(text)) statusBadge.classList.add('status-error');
      else statusBadge.classList.add('status-ready');
    }

    function removeThinking() {
      if (thinkingEl && thinkingEl.parentNode) thinkingEl.parentNode.removeChild(thinkingEl);
      thinkingEl = null;
    }

    function showThinking() {
      removeThinking();
      const wrap = document.createElement('div');
      wrap.className = 'msg assistant thinking';
      wrap.innerHTML = `
        <div class="msg-avatar" aria-hidden="true">AI</div>
        <div class="msg-inner">
          <div class="msg-label">Assistant</div>
          <div class="bubble">
            <div class="typing-dots" aria-label="Thinking"><span></span><span></span><span></span></div>
          </div>
        </div>`;
      chatBody.appendChild(wrap);
      thinkingEl = wrap;
      scrollToBottom();
    }

    function showError(text) {
      errBox.style.display = 'block';
      errBox.textContent = text;
    }
    function clearError() {
      errBox.style.display = 'none';
      errBox.textContent = '';
    }

    function scrollToBottom() {
      chatBody.scrollTop = chatBody.scrollHeight;
    }

    function addMessage(kind, text) {
      const isUser = kind === 'user';
      const wrap = document.createElement('div');
      wrap.className = 'msg ' + kind;

      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.setAttribute('aria-hidden', 'true');
      avatar.textContent = isUser ? 'U' : 'AI';

      const inner = document.createElement('div');
      inner.className = 'msg-inner';

      const label = document.createElement('div');
      label.className = 'msg-label';
      label.textContent = isUser ? 'You' : 'Assistant';

      const bubble = document.createElement('div');
      bubble.className = 'bubble plain-text';
      bubble.textContent = text;

      inner.appendChild(label);
      inner.appendChild(bubble);
      wrap.appendChild(avatar);
      wrap.appendChild(inner);
      chatBody.appendChild(wrap);
      scrollToBottom();
      return bubble;
    }

    function renderWelcome() {
      const card = document.createElement('div');
      card.className = 'welcome-card';
      card.innerHTML = `
        <h3>What can I help you find?</h3>
        <p>Search policy documents, query Northwind sales data, or explore the knowledge graph with cited sources.</p>
        <div class="welcome-examples">
          <button type="button" class="example-chip" data-q="Top 5 products by sales revenue">Top products by revenue</button>
          <button type="button" class="example-chip" data-q="Show order volumes by month over time">Orders by month</button>
          <button type="button" class="example-chip" data-q="Tell me about whistleblowing procedures">Policy search</button>
        </div>`;
      card.querySelectorAll('.example-chip').forEach(btn => {
        btn.addEventListener('click', () => {
          q.value = btn.getAttribute('data-q');
          q.focus();
        });
      });
      chatBody.appendChild(card);
    }

    function buildMetaChips(accessLevel, agent, strategy, routeTool, queryType, presentationKind, followUp) {
      const chips = [];
      if (followUp) chips.push({ label: '↳ ' + followUp.replace(/_/g, ' '), accent: true });
      if (agent) chips.push({ label: agent, accent: true });
      if (strategy) chips.push({ label: strategy });
      if (queryType) chips.push({ label: queryType });
      if (presentationKind) chips.push({ label: 'ui: ' + presentationKind });
      if (accessLevel) chips.push({ label: accessLevel });
      if (routeTool) chips.push({ label: routeTool });
      const row = document.createElement('div');
      row.className = 'meta-row';
      chips.forEach(c => {
        const span = document.createElement('span');
        span.className = 'meta-chip' + (c.accent ? ' accent' : '');
        span.textContent = c.label;
        row.appendChild(span);
      });
      return row;
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function renderMarkdownSimple(el, content) {
      const raw = (content || '').trim();
      if (!raw) {
        el.innerHTML = '<div class="pres-md pres-empty">(No text in response)</div>';
        return;
      }
      let html = escapeHtml(raw);
      html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\n\n/g, '</p><p>');
      html = html.replace(/\n/g, '<br>');
      el.innerHTML = '<div class="pres-md"><p>' + html + '</p></div>';
    }

    function formatChartValue(v, block) {
      const n = Number(v);
      if (Number.isNaN(n)) return String(v);
      if (block.valueFormat === 'percent') return n.toFixed(1) + '%';
      if (Math.abs(n) >= 1000) return n.toLocaleString(undefined, { maximumFractionDigits: 0 });
      if (Number.isInteger(n)) return String(n);
      return n.toLocaleString(undefined, { maximumFractionDigits: 2 });
    }

    function sortTableRows(rows, colIdx, asc) {
      return [...rows].sort((a, b) => {
        const av = (a[colIdx] || '').replace(/,/g, '');
        const bv = (b[colIdx] || '').replace(/,/g, '');
        const an = parseFloat(av);
        const bn = parseFloat(bv);
        if (!Number.isNaN(an) && !Number.isNaN(bn)) return asc ? an - bn : bn - an;
        return asc
          ? String(a[colIdx]).localeCompare(String(b[colIdx]))
          : String(b[colIdx]).localeCompare(String(a[colIdx]));
      });
    }

    const CHART_PALETTE = [
      'hsla(210, 70%, 58%, 0.85)',
      'hsla(168, 65%, 52%, 0.85)',
      'hsla(132, 60%, 50%, 0.85)',
      'hsla(95, 58%, 48%, 0.85)',
      'hsla(48, 70%, 55%, 0.85)',
      'hsla(280, 55%, 62%, 0.85)',
      'hsla(320, 60%, 58%, 0.85)',
      'hsla(12, 72%, 58%, 0.85)',
    ];

    function chartContainerHeight(chartType, labelCount) {
      const ctype = (chartType || 'bar').toLowerCase();
      const n = Math.max(2, labelCount || 2);
      if (ctype === 'bar-horizontal') {
        return Math.min(420, Math.max(240, n * 26 + 48));
      }
      if (ctype === 'pie' || ctype === 'doughnut') {
        return 300;
      }
      if (ctype === 'line') {
        return 280;
      }
      return 280;
    }

    function destroyChartsIn(root) {
      if (!root) return;
      root.querySelectorAll('.pres-chart-canvas-wrap').forEach((wrap) => {
        if (wrap._chartResizeObserver) {
          wrap._chartResizeObserver.disconnect();
          wrap._chartResizeObserver = null;
        }
      });
      root.querySelectorAll('canvas').forEach((canvas) => {
        if (canvas.chartInstance) {
          canvas.chartInstance.destroy();
          canvas.chartInstance = null;
        }
      });
    }

    function observeChartResize(canvasWrap, chart) {
      if (!canvasWrap || !chart || typeof ResizeObserver === 'undefined') return;
      const ro = new ResizeObserver(() => {
        if (canvasWrap.isConnected && chart.canvas) {
          chart.resize();
        }
      });
      ro.observe(canvasWrap);
      canvasWrap._chartResizeObserver = ro;
    }

    function renderChartBarsLegacy(block, wrap, vals, labels) {
      const chart = document.createElement('div');
      chart.className = 'pres-chart';
      const max = Math.max(...vals, 1);
      const trackInnerPx = 88;
      const barHues = [210, 168, 132, 95, 48, 280, 320];
      vals.forEach((v, i) => {
        const col = document.createElement('div');
        col.className = 'pres-bar-col';
        const valEl = document.createElement('div');
        valEl.className = 'pres-bar-value';
        valEl.textContent = formatChartValue(v, block);
        const track = document.createElement('div');
        track.className = 'pres-bar-track';
        const bar = document.createElement('div');
        bar.className = 'pres-bar';
        const px = Math.max(3, Math.round((v / max) * trackInnerPx));
        bar.style.height = px + 'px';
        const hue = barHues[i % barHues.length];
        bar.style.background = `linear-gradient(180deg, hsl(${hue} 70% 58%), hsl(${hue} 65% 42%))`;
        bar.title = (labels[i] || '') + ': ' + formatChartValue(v, block);
        track.appendChild(bar);
        const lbl = document.createElement('div');
        lbl.className = 'pres-bar-label';
        lbl.textContent = labels[i] || '';
        col.appendChild(valEl);
        col.appendChild(track);
        col.appendChild(lbl);
        chart.appendChild(col);
      });
      wrap.appendChild(chart);
    }

    function renderChartJs(canvas, block, chartType, vals, labels) {
      const ctype = (chartType || 'bar').toLowerCase();
      const isHorizontal = ctype === 'bar-horizontal';
      const isPie = ctype === 'pie' || ctype === 'doughnut';
      const isLine = ctype === 'line';
      const jsType = isHorizontal ? 'bar' : (isPie ? (ctype === 'doughnut' ? 'doughnut' : 'pie') : (isLine ? 'line' : 'bar'));

      const bg = CHART_PALETTE.slice(0, vals.length);
      const border = bg.map(c => c.replace('0.85', '1'));

      const dataset = {
        label: block.title || block.valueKey || 'Value',
        data: vals,
        backgroundColor: isLine ? 'hsla(210, 70%, 58%, 0.25)' : bg,
        borderColor: isLine ? 'hsla(210, 70%, 58%, 1)' : border,
        borderWidth: isLine ? 2 : 1,
        fill: isLine,
        tension: 0.25,
      };

      const options = {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            display: isPie,
            position: 'bottom',
            labels: { color: '#94a3b8', boxWidth: 12, padding: 10 },
          },
          tooltip: {
            callbacks: {
              label(ctx) {
                let val = ctx.raw;
                if (typeof ctx.parsed === 'number') val = ctx.parsed;
                else if (ctx.parsed && typeof ctx.parsed.y === 'number') val = ctx.parsed.y;
                return (ctx.label || '') + ': ' + formatChartValue(val, block);
              },
            },
          },
        },
        scales: {},
      };

      if (!isPie) {
        options.scales = {
          x: {
            ticks: { color: '#94a3b8', maxRotation: 45, minRotation: 0 },
            grid: { color: 'rgba(255,255,255,0.06)' },
          },
          y: {
            ticks: {
              color: '#94a3b8',
              callback: (v) => formatChartValue(v, block),
            },
            grid: { color: 'rgba(255,255,255,0.06)' },
            beginAtZero: true,
          },
        };
        if (isHorizontal) {
          options.indexAxis = 'y';
        }
      } else {
        options.scales = { x: { display: false }, y: { display: false } };
        if (ctype === 'doughnut') {
          options.cutout = '58%';
        }
      }

      if (canvas.chartInstance) {
        canvas.chartInstance.destroy();
      }
      const instance = new Chart(canvas, {
        type: jsType,
        data: { labels, datasets: [dataset] },
        options,
      });
      canvas.chartInstance = instance;
      requestAnimationFrame(() => {
        if (canvas.chartInstance) canvas.chartInstance.resize();
      });
      const wrap = canvas.parentElement;
      if (wrap) observeChartResize(wrap, instance);
    }

    const BLOCK_RENDERERS = {
      image(block, container) {
        const wrap = document.createElement('div');
        wrap.className = 'pres-block pres-img-wrap';
        const img = document.createElement('img');
        img.className = 'pres-img';
        img.src = block.url;
        img.alt = block.alt || 'Page image';
        img.loading = 'lazy';
        img.title = 'Click to view full size';
        img.addEventListener('click', () => window.open(block.url, '_blank', 'noopener'));
        wrap.appendChild(img);
        if (block.caption) {
          const cap = document.createElement('div');
          cap.className = 'pres-caption';
          cap.textContent = block.caption;
          wrap.appendChild(cap);
        }
        container.appendChild(wrap);
      },
      table(block, container) {
        const wrap = document.createElement('div');
        wrap.className = 'pres-block pres-table-wrap';
        if (block.title) {
          const t = document.createElement('div');
          t.className = 'pres-caption';
          t.textContent = block.title;
          wrap.appendChild(t);
        }
        const table = document.createElement('table');
        table.className = 'pres-table' + (block.interactive ? ' interactive' : '');
        const thead = document.createElement('thead');
        const hr = document.createElement('tr');
        let sortState = { col: -1, asc: true };
        let currentRows = block.rows || [];

        function renderBody() {
          tbody.innerHTML = '';
          currentRows.forEach((row, rowIdx) => {
            const tr = document.createElement('tr');
            tr.dataset.rowIdx = String(rowIdx);
            row.forEach(cell => {
              const td = document.createElement('td');
              td.textContent = cell;
              tr.appendChild(td);
            });
            if (block.interactive) {
              tr.addEventListener('mouseenter', () => {
                wrap.dispatchEvent(new CustomEvent('pres-row-hover', {
                  detail: { label: row[0] || '' },
                  bubbles: true,
                }));
              });
            }
            tbody.appendChild(tr);
          });
        }

        (block.headers || []).forEach((h, colIdx) => {
          const th = document.createElement('th');
          th.textContent = h;
          if (block.interactive) {
            th.title = 'Click to sort';
            th.addEventListener('click', () => {
              const asc = sortState.col === colIdx ? !sortState.asc : true;
              sortState = { col: colIdx, asc };
              currentRows = sortTableRows(currentRows, colIdx, asc);
              renderBody();
            });
          }
          hr.appendChild(th);
        });
        thead.appendChild(hr);
        table.appendChild(thead);
        const tbody = document.createElement('tbody');
        table.appendChild(tbody);
        renderBody();
        wrap.appendChild(table);
        container.appendChild(wrap);
      },
      chart(block, container) {
        const wrap = document.createElement('div');
        wrap.className = 'pres-block';
        wrap.dataset.chartType = (block.chartType || 'bar').toLowerCase();
        if (block.title) {
          const t = document.createElement('div');
          t.className = 'pres-caption';
          t.textContent = block.title;
          wrap.appendChild(t);
        }
        const vals = (block.values || []).map(v => Number(v)).filter(v => !Number.isNaN(v));
        const labels = block.labels || vals.map((_, i) => String(i + 1));
        if (vals.length < 2) return;

        const chartType = (block.chartType || 'bar').toLowerCase();
        if (typeof Chart !== 'undefined') {
          const canvasWrap = document.createElement('div');
          canvasWrap.className = 'pres-chart-canvas-wrap';
          const chartH = chartContainerHeight(chartType, labels.length);
          canvasWrap.style.setProperty('--chart-h', chartH + 'px');
          const canvas = document.createElement('canvas');
          canvasWrap.appendChild(canvas);
          wrap.appendChild(canvasWrap);
          try {
            renderChartJs(canvas, block, chartType, vals, labels);
          } catch (err) {
            console.warn('Chart.js render failed, using bars', err);
            renderChartBarsLegacy(block, wrap, vals, labels);
          }
        } else {
          renderChartBarsLegacy(block, wrap, vals, labels);
        }
        container.appendChild(wrap);
      },
      markdown(block, container) {
        const wrap = document.createElement('div');
        wrap.className = 'pres-block';
        renderMarkdownSimple(wrap, block.content || '');
        container.appendChild(wrap);
      },
    };

    function markRichUi(inner, blocks) {
      if (!inner || !blocks || !blocks.length) return;
      const rich = blocks.some((b) => b.type === 'chart' || b.type === 'table');
      if (rich) inner.classList.add('has-rich-ui');
    }

    function renderPresentation(bubble, presentation, fallbackAnswer) {
      destroyChartsIn(bubble);
      bubble.classList.remove('plain-text');
      bubble.textContent = '';
      const blocks = (presentation && presentation.blocks) || [];
      const inner = bubble.closest('.msg-inner');
      markRichUi(inner, blocks);
      if (!blocks.length) {
        bubble.classList.add('plain-text');
        bubble.textContent = fallbackAnswer || '(no answer)';
        return;
      }
      blocks.forEach(block => {
        const fn = BLOCK_RENDERERS[block.type];
        if (fn) fn(block, bubble);
        else {
          const pre = document.createElement('pre');
          pre.textContent = JSON.stringify(block, null, 2);
          bubble.appendChild(pre);
        }
      });
      const hasInteractive = blocks.some(b => b.interactive);
      if (hasInteractive) {
        bubble.addEventListener('pres-row-hover', (e) => {
          const label = (e.detail && e.detail.label) || '';
          bubble.querySelectorAll('.pres-bar-col').forEach(col => {
            const lbl = col.querySelector('.pres-bar-label');
            col.classList.toggle('bar-active', lbl && lbl.textContent.trim() === label.trim());
          });
          bubble.querySelectorAll('table.pres-table tbody tr').forEach(tr => {
            const first = tr.querySelector('td');
            tr.classList.toggle('row-highlight', first && first.textContent.trim() === label.trim());
          });
        });
      }
    }

    function formatTelemetryChip(telemetry) {
      if (!telemetry || !telemetry.totals) return null;
      const t = telemetry.totals;
      const tok = Number(t.total_tokens || 0);
      const calls = `chat:${t.chat_calls || 0} emb:${t.embed_calls || 0}`;
      const route = telemetry.route || {};
      const routeBit = route.tool ? `route:${route.tool}` : '';
      const failBit = telemetry.failed_step ? `fail:${telemetry.failed_step}` : '';
      const parts = [`tokens:${tok.toLocaleString()} (${calls})`];
      if (routeBit) parts.push(routeBit);
      if (failBit) parts.push(failBit);
      return parts.join(' · ');
    }

    function formatPipelineSummary(telemetry) {
      const steps = (telemetry && telemetry.pipeline) || [];
      if (!steps.length) return null;
      return steps.map(s => {
        const ms = s.duration_ms != null ? `${s.duration_ms}ms` : '';
        const st = s.status === 'error' ? '✗' : '✓';
        return `${st} ${s.step}${ms ? ' (' + ms + ')' : ''}`;
      }).join(' → ');
    }

    function extractTries(telemetry) {
      const events = (telemetry && telemetry.events) || [];
      for (const e of events) {
        if (e.kind === 'structured_execute' && e.meta && typeof e.meta.attempts === 'number') {
          return e.meta.attempts;
        }
      }
      return null;
    }

    function addAssistantResponse(answer, sources, accessLevel, agent, strategy, routeTool, routeMethod, presentation, queryType, followUp, telemetry) {
      removeThinking();
      const wrap = document.createElement('div');
      wrap.className = 'msg assistant';

      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.textContent = 'AI';

      const inner = document.createElement('div');
      inner.className = 'msg-inner';

      const label = document.createElement('div');
      label.className = 'msg-label';
      label.textContent = 'Assistant';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      const ans = (answer || '').trim();
      if (presentation && presentation.blocks && presentation.blocks.length) {
        renderPresentation(bubble, presentation, ans);
        if (!bubble.textContent.trim() && !bubble.querySelector('.pres-md, .pres-block, img')) {
          bubble.classList.add('plain-text');
          bubble.textContent = ans || '(no answer)';
        }
      } else {
        bubble.classList.add('plain-text');
        bubble.textContent = ans || '(no answer)';
      }

      inner.appendChild(label);
      inner.appendChild(bubble);
      const metaRow = buildMetaChips(
        accessLevel, agent, strategy, routeTool, queryType,
        presentation && presentation.kind,
        followUp
      );
      const telChip = formatTelemetryChip(telemetry);
      const tries = extractTries(telemetry);
      if (tries !== null) {
        const span = document.createElement('span');
        span.className = 'meta-chip';
        span.textContent = `tries:${tries}`;
        metaRow.appendChild(span);
      }
      if (telChip) {
        const span = document.createElement('span');
        span.className = 'meta-chip';
        span.title = formatPipelineSummary(telemetry) || telChip;
        span.textContent = telChip;
        metaRow.appendChild(span);
      }
      inner.appendChild(metaRow);

      if (sources && sources.length) {
        const details = document.createElement('details');
        details.className = 'sources-panel';
        const summary = document.createElement('summary');
        summary.textContent = `View sources (${sources.length})`;
        details.appendChild(summary);

        sources.slice(0, 10).forEach((s) => {
          const pre = document.createElement('div');
          pre.className = 'source';
          pre.textContent = JSON.stringify(s, null, 2);
          details.appendChild(pre);
        });
        if (sources.length > 10) {
          const more = document.createElement('div');
          more.className = 'source';
          more.textContent = `… ${sources.length - 10} more sources not shown`;
          details.appendChild(more);
        }
        inner.appendChild(details);
      }

      if (telemetry) {
        const details = document.createElement('details');
        details.className = 'sources-panel';
        const summary = document.createElement('summary');
        summary.textContent = 'View telemetry';
        details.appendChild(summary);
        const pre = document.createElement('div');
        pre.className = 'source';
        pre.textContent = JSON.stringify(telemetry, null, 2);
        details.appendChild(pre);
        inner.appendChild(details);
      }

      wrap.appendChild(avatar);
      wrap.appendChild(inner);
      chatBody.appendChild(wrap);
      scrollToBottom();
    }

    function getCtx() {
      return {
        role: document.getElementById('role').value,
        user_id: document.getElementById('user_id').value,
        department: document.getElementById('department').value || null,
        thread_id: 'default'
      };
    }

    async function send() {
      const question = q.value.trim();
      if (!question) return;
      clearError();

      if (authConfig.enabled && !getStoredToken() && !authConfig.allow_body_fallback) {
        showError('Sign in with Google to continue.');
        return;
      }

      addMessage('user', question);
      q.value = '';
      setStatus('Thinking…');
      sendBtn.disabled = true;
      showThinking();

      const ctx = getCtx();
      const useStream = document.getElementById('use_stream').checked;

      try {
        if (useStream) {
          await sendStreaming(question, ctx);
        } else {
          await sendClassic(question, ctx);
        }
        setStatus('Ready');
      } catch (e) {
        removeThinking();
        showError(e.message || String(e));
        setStatus('Error');
      } finally {
        sendBtn.disabled = false;
      }
    }

    async function sendClassic(question, ctx) {
      const res = await fetch('/query', {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({
          question,
          role: ctx.role,
          user_id: ctx.user_id,
          department: ctx.department,
          thread_id: ctx.thread_id
        })
      });

      const payloadText = await res.text();
      if (!res.ok) throw new Error(payloadText || 'Request failed');
      const payload = JSON.parse(payloadText);

      addAssistantResponse(
        payload.answer,
        payload.sources,
        payload.access_level,
        payload.agent,
        payload.strategy,
        payload.route_tool,
        payload.route_method,
        payload.presentation,
        payload.query_type,
        payload.follow_up,
        payload.telemetry
      );
    }

    function createStreamingAssistantShell() {
      removeThinking();
      const wrap = document.createElement('div');
      wrap.className = 'msg assistant';

      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.textContent = 'AI';

      const inner = document.createElement('div');
      inner.className = 'msg-inner';

      const label = document.createElement('div');
      label.className = 'msg-label';
      label.textContent = 'Assistant';

      const bubble = document.createElement('div');
      bubble.className = 'bubble plain-text';
      bubble.textContent = '';

      inner.appendChild(label);
      inner.appendChild(bubble);
      wrap.appendChild(avatar);
      wrap.appendChild(inner);
      chatBody.appendChild(wrap);
      scrollToBottom();

      return { wrap, inner, bubble, text: '', mdEl: null, hasPresentation: false };
    }

    function appendStreamToken(state, delta) {
      if (!delta) return;
      state.text += delta;
      if (state.hasPresentation) {
        if (!state.mdEl) {
          state.mdEl = document.createElement('div');
          state.mdEl.className = 'pres-block stream-markdown pres-md';
          state.bubble.appendChild(state.mdEl);
        }
        state.bubble.classList.remove('plain-text');
        renderMarkdownSimple(state.mdEl, state.text);
      } else {
        state.bubble.textContent = state.text;
      }
      scrollToBottom();
    }

    function finalizeStreamingAssistant(state, event) {
      const answer = event.answer || state.text || '';
      const presentation = event.presentation;
      const sources = event.sources || [];
      const telemetry = event.telemetry || null;

      if (presentation && presentation.blocks && presentation.blocks.length) {
        const hasChartOrTable = state.bubble.querySelector('.pres-chart-canvas-wrap, .pres-chart, .pres-table');
        if (!hasChartOrTable) {
          renderPresentation(state.bubble, presentation, answer);
        } else {
          markRichUi(state.inner, presentation.blocks);
          const hasMd = presentation.blocks.some((b) => b.type === 'markdown');
          if (hasMd && state.text) {
            let mdEl = state.bubble.querySelector('.stream-markdown');
            if (!mdEl) {
              mdEl = document.createElement('div');
              mdEl.className = 'pres-block stream-markdown pres-md';
              state.bubble.appendChild(mdEl);
            }
            renderMarkdownSimple(mdEl, state.text || answer);
          }
        }
        if (!state.bubble.textContent.trim() && !state.bubble.querySelector('.pres-md, .pres-block, img')) {
          state.bubble.classList.add('plain-text');
          state.bubble.textContent = answer || '(no answer)';
        }
      } else if (!state.text && answer) {
        state.bubble.classList.add('plain-text');
        state.bubble.textContent = answer;
      }

      const metaRow = buildMetaChips(
        event.access_level,
        event.agent,
        event.strategy,
        event.route_tool,
        event.query_type,
        presentation && presentation.kind,
        event.follow_up
      );
      const telChip = formatTelemetryChip(telemetry);
      if (telChip) {
        const span = document.createElement('span');
        span.className = 'meta-chip telemetry-chip';
        span.textContent = telChip;
        span.title = formatPipelineSummary(telemetry) || telChip;
        metaRow.appendChild(span);
      }
      state.inner.appendChild(metaRow);

      if (sources && sources.length) {
        const details = document.createElement('details');
        details.className = 'sources-panel';
        const summary = document.createElement('summary');
        summary.textContent = `View sources (${sources.length})`;
        details.appendChild(summary);
        sources.slice(0, 10).forEach(s => {
          const pre = document.createElement('div');
          pre.className = 'source';
          pre.textContent = JSON.stringify(s, null, 2);
          details.appendChild(pre);
        });
        if (sources.length > 10) {
          const more = document.createElement('div');
          more.className = 'source';
          more.textContent = `… ${sources.length - 10} more sources not shown`;
          details.appendChild(more);
        }
        state.inner.appendChild(details);
      }

      scrollToBottom();
    }

    async function sendStreaming(question, ctx) {
      const res = await fetch('/query/stream', {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({
          question,
          role: ctx.role,
          user_id: ctx.user_id,
          department: ctx.department,
          thread_id: ctx.thread_id
        })
      });

      if (!res.ok) {
        const t = await res.text();
        throw new Error(t || 'Stream request failed');
      }

      let state = null;
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';

        for (const line of lines) {
          if (!line.trim()) continue;
          let event;
          try {
            event = JSON.parse(line);
          } catch (err) {
            console.warn('Bad stream line', line, err);
            continue;
          }

          if (event.type === 'error') {
            throw new Error(event.message || 'Stream error');
          }

          if (event.type === 'status') {
            if (!state) state = createStreamingAssistantShell();
            const phase = event.phase || 'working';
            setStatus(phase === 'synthesis' ? 'Writing…' : phase === 'retrieval' ? 'Retrieving…' : 'Thinking…');
            continue;
          }

          if (event.type === 'presentation' && event.partial && event.blocks) {
            if (!state) state = createStreamingAssistantShell();
            state.hasPresentation = true;
            state.bubble.classList.remove('plain-text');
            state.bubble.textContent = '';
            markRichUi(state.inner, event.blocks);
            renderPresentation(state.bubble, { kind: 'mixed', blocks: event.blocks }, '');
            setStatus('Writing…');
            continue;
          }

          if (event.type === 'token') {
            if (!state) state = createStreamingAssistantShell();
            appendStreamToken(state, event.delta || '');
            continue;
          }

          if (event.type === 'done') {
            if (!state) state = createStreamingAssistantShell();
            finalizeStreamingAssistant(state, event);
            continue;
          }
        }
      }

      if (buffer.trim()) {
        try {
          const event = JSON.parse(buffer);
          if (event.type === 'done' && state) finalizeStreamingAssistant(state, event);
        } catch (_) { /* ignore trailing partial */ }
      }
    }

    sendBtn.addEventListener('click', send);
    q.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    document.getElementById('new_chat').addEventListener('click', async () => {
      chatBody.innerHTML = '';
      clearError();
      setStatus('Ready');
      try {
        await fetch('/chat/clear', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ thread_id: getCtx().thread_id }),
        });
      } catch (_) { /* non-fatal */ }
      renderWelcome();
    });

    document.getElementById('ping').addEventListener('click', async () => {
      clearError();
      setStatus('Checking…');
      try {
        const res = await fetch('/health');
        const text = await res.text();
        if (!res.ok) throw new Error(text || 'Health check failed');
        setStatus('Healthy');
      } catch (e) {
        showError(e.message || String(e));
        setStatus('Error');
      }
    });

    renderWelcome();
  </script>
</body>
</html>
