<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agentic Graph RAG</title>
  <style>
    :root{
      --bg0:#0b1220;
      --bg1:#0f1a2e;
      --card: rgba(255,255,255,0.06);
      --card2: rgba(255,255,255,0.10);
      --border: rgba(255,255,255,0.12);
      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.68);
      --accent:#60a5fa;
      --accent2:#22c55e;
      --danger:#ef4444;
      --shadow: 0 20px 50px rgba(0,0,0,0.35);
      --radius: 18px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: var(--sans);
      color: var(--text);
      background:
        radial-gradient(1200px 600px at 15% 20%, rgba(96,165,250,0.18), transparent 60%),
        radial-gradient(900px 500px at 85% 25%, rgba(34,197,94,0.14), transparent 60%),
        radial-gradient(1200px 700px at 50% 100%, rgba(168,85,247,0.10), transparent 60%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      min-height:100vh;
      display:flex;
      align-items:stretch;
      justify-content:center;
      padding: 24px;
    }
    .shell{
      width:min(1100px, 100%);
      display:grid;
      grid-template-columns: 360px 1fr;
      gap: 18px;
    }
    @media (max-width: 980px){
      .shell{ grid-template-columns: 1fr; }
    }
    .panel{
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .panel-header{
      padding: 16px 16px 12px 16px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
    }
    .title{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      margin:0;
    }
    .brand{
      display:flex;
      align-items:center;
      gap: 10px;
      font-weight: 800;
      letter-spacing: 0.2px;
    }
    .dot{
      width:10px;height:10px;border-radius:99px;
      background: radial-gradient(circle at 30% 30%, #93c5fd, #2563eb);
      box-shadow: 0 0 0 4px rgba(96,165,250,0.20);
    }
    .badge{
      font-size: 12px;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      color: var(--muted);
      white-space: nowrap;
    }
    .content{
      padding: 16px;
    }
    label{
      display:block;
      font-size: 12px;
      color: var(--muted);
      margin: 14px 0 6px;
    }
    input[type=text], select{
      width:100%;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,0.15);
      color: var(--text);
      outline:none;
    }
    input[type=text]:focus{
      border-color: rgba(96,165,250,0.55);
      box-shadow: 0 0 0 4px rgba(96,165,250,0.18);
    }
    .hint{
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }
    .btn-row{
      display:flex; gap: 10px; margin-top: 14px;
    }
    button{
      appearance:none;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.08);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 12px;
      cursor:pointer;
      font-weight: 650;
    }
    button.primary{
      border-color: rgba(96,165,250,0.55);
      background: linear-gradient(180deg, rgba(96,165,250,0.35), rgba(96,165,250,0.14));
    }
    button:disabled{
      opacity: 0.6;
      cursor:not-allowed;
    }

    /* Chat */
    .chat{
      display:flex;
      flex-direction:column;
      height: calc(100vh - 48px);
      min-height: 640px;
    }
    .chat-body{
      padding: 14px;
      flex: 1;
      overflow:auto;
    }
    .msg{
      display:flex;
      margin: 12px 0;
    }
    .msg.user{ justify-content:flex-end; }
    .bubble{
      max-width: 78%;
      padding: 12px 12px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.07);
      line-height: 1.45;
      word-wrap: break-word;
    }
    .bubble.plain-text{ white-space: pre-wrap; }
    .pres-block{ margin: 10px 0; }
    .pres-block:first-child{ margin-top: 0; }
    .pres-img{
      max-width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border);
      margin: 8px 0;
    }
    .pres-caption{ font-size: 12px; color: var(--muted); margin-top: 4px; }
    .pres-table-wrap{ overflow-x: auto; margin: 8px 0; }
    table.pres-table{
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    table.pres-table th, table.pres-table td{
      border: 1px solid var(--border);
      padding: 8px 10px;
      text-align: left;
    }
    table.pres-table th{ background: rgba(96,165,250,0.15); }
    table.pres-table.interactive th{
      cursor: pointer;
      user-select: none;
    }
    table.pres-table.interactive th:hover{ background: rgba(96,165,250,0.28); }
    table.pres-table.interactive tbody tr:hover{ background: rgba(34,197,94,0.08); }
    table.pres-table tr.row-highlight{ background: rgba(96,165,250,0.18); }
    .pres-chart{
      display: flex;
      align-items: flex-end;
      gap: 10px;
      min-height: 200px;
      margin: 10px 0;
      padding: 10px 12px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(0,0,0,0.12);
      overflow: hidden;
    }
    .pres-bar-col{
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      min-width: 40px;
      max-width: 80px;
      min-height: 0;
    }
    .pres-bar-value{
      font-size: 10px;
      font-weight: 600;
      color: var(--text);
      text-align: center;
      line-height: 1.25;
      max-width: 100%;
      padding: 0 2px;
      flex-shrink: 0;
    }
    .pres-bar-track{
      width: 100%;
      height: 96px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-top: 8px;
      box-sizing: border-box;
      flex-shrink: 0;
    }
    .pres-bar{
      width: 32px;
      border-radius: 6px 6px 0 0;
      min-height: 3px;
      max-height: 100%;
      transition: height 0.2s ease, filter 0.15s ease;
      cursor: default;
    }
    .pres-bar-col:hover .pres-bar{ filter: brightness(1.15); }
    .pres-bar-col.bar-active .pres-bar{ outline: 2px solid rgba(96,165,250,0.9); }
    .pres-bar-label{
      font-size: 10px;
      color: var(--muted);
      text-align: center;
      line-height: 1.25;
      max-width: 100%;
      padding: 0 2px;
      flex-shrink: 0;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .pres-md h1,.pres-md h2,.pres-md h3{ margin: 0.6em 0 0.3em; }
    .pres-md p{ margin: 0.4em 0; }
    .pres-md ul{ margin: 0.4em 0; padding-left: 1.2em; }
    .msg.user .bubble{
      background: linear-gradient(180deg, rgba(96,165,250,0.28), rgba(96,165,250,0.10));
      border-color: rgba(96,165,250,0.45);
    }
    .meta{
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
      display:flex;
      gap: 10px;
      align-items:center;
    }
    details{
      margin-top: 10px;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 8px 10px;
      background: rgba(0,0,0,0.12);
    }
    summary{
      cursor:pointer;
      color: var(--muted);
      font-weight: 650;
    }
    .source{
      font-family: var(--mono);
      font-size: 12px;
      color: rgba(255,255,255,0.86);
      border-top: 1px dashed rgba(255,255,255,0.14);
      padding-top: 8px;
      margin-top: 8px;
      white-space: pre-wrap;
    }
    .chat-input{
      border-top: 1px solid var(--border);
      padding: 12px;
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.08));
    }
    .input-row{
      display:flex;
      gap: 10px;
      align-items:flex-end;
    }
    textarea{
      flex:1;
      min-height: 44px;
      max-height: 150px;
      resize: vertical;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,0.15);
      color: var(--text);
      outline:none;
      line-height: 1.35;
      font-family: var(--sans);
    }
    textarea:focus{
      border-color: rgba(96,165,250,0.55);
      box-shadow: 0 0 0 4px rgba(96,165,250,0.18);
    }
    .error{
      color: rgba(255,255,255,0.92);
      background: rgba(239,68,68,0.18);
      border: 1px solid rgba(239,68,68,0.35);
      padding: 10px 12px;
      border-radius: 12px;
      margin: 10px 14px 0 14px;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="panel">
      <div class="panel-header">
        <h2 class="title">
          <span class="brand"><span class="dot"></span>Agentic Graph RAG</span>
          <span class="badge">FastAPI · Neo4j · RAG</span>
        </h2>
      </div>
      <div class="content">
        <label>Role</label>
        <select id="role">
          <option value="public">public</option>
          <option value="regular_office">regular_office</option>
          <option value="compliance_officer">compliance_officer</option>
          <option value="admin">admin</option>
        </select>

        <label>User ID</label>
        <input id="user_id" type="text" value="public_001" />

        <label>Department (optional)</label>
        <input id="department" type="text" placeholder="Compliance" />

        <div class="btn-row">
          <button id="new_chat">New chat</button>
          <button class="primary" id="ping">Health</button>
        </div>

        <div class="hint">
          Tip: If you see permission errors, use a seeded RBAC user like <span style="font-family:var(--mono)">public_001</span> / <span style="font-family:var(--mono)">compliance_001</span> / <span style="font-family:var(--mono)">admin_001</span>.
        </div>
      </div>
    </div>

    <div class="panel chat">
      <div class="panel-header">
        <h2 class="title">
          <span class="brand">Conversation</span>
          <span class="badge" id="status">Ready</span>
        </h2>
      </div>
      <div id="err" class="error" style="display:none;"></div>
      <div id="chat_body" class="chat-body"></div>
      <div class="chat-input">
        <div class="input-row">
          <textarea id="q" placeholder="Ask about policies, documents, reporting obligations..." spellcheck="false"></textarea>
          <button class="primary" id="send">Send</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const chatBody = document.getElementById('chat_body');
    const q = document.getElementById('q');
    const sendBtn = document.getElementById('send');
    const statusBadge = document.getElementById('status');
    const errBox = document.getElementById('err');

    function setStatus(text) {
      statusBadge.textContent = text;
    }

    function showError(text) {
      errBox.style.display = 'block';
      errBox.textContent = text;
    }
    function clearError() {
      errBox.style.display = 'none';
      errBox.textContent = '';
    }

    function scrollToBottom() {
      chatBody.scrollTop = chatBody.scrollHeight;
    }

    function addMessage(kind, text, meta) {
      const wrap = document.createElement('div');
      wrap.className = 'msg ' + kind;

      const bubble = document.createElement('div');
      bubble.className = 'bubble plain-text';
      bubble.textContent = text;

      wrap.appendChild(bubble);

      if (meta) {
        const m = document.createElement('div');
        m.className = 'meta';
        m.textContent = meta;
        bubble.appendChild(m);
      }

      chatBody.appendChild(wrap);
      scrollToBottom();
      return bubble;
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function renderMarkdownSimple(el, content) {
      let html = escapeHtml(content || '');
      html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\n\n/g, '</p><p>');
      html = html.replace(/\n/g, '<br>');
      el.innerHTML = '<div class="pres-md"><p>' + html + '</p></div>';
    }

    function formatChartValue(v, block) {
      const n = Number(v);
      if (Number.isNaN(n)) return String(v);
      if (block.valueFormat === 'percent') return n.toFixed(1) + '%';
      if (Math.abs(n) >= 1000) return n.toLocaleString(undefined, { maximumFractionDigits: 0 });
      if (Number.isInteger(n)) return String(n);
      return n.toLocaleString(undefined, { maximumFractionDigits: 2 });
    }

    function sortTableRows(rows, colIdx, asc) {
      return [...rows].sort((a, b) => {
        const av = (a[colIdx] || '').replace(/,/g, '');
        const bv = (b[colIdx] || '').replace(/,/g, '');
        const an = parseFloat(av);
        const bn = parseFloat(bv);
        if (!Number.isNaN(an) && !Number.isNaN(bn)) return asc ? an - bn : bn - an;
        return asc
          ? String(a[colIdx]).localeCompare(String(b[colIdx]))
          : String(b[colIdx]).localeCompare(String(a[colIdx]));
      });
    }

    const BLOCK_RENDERERS = {
      image(block, container) {
        const wrap = document.createElement('div');
        wrap.className = 'pres-block';
        const img = document.createElement('img');
        img.className = 'pres-img';
        img.src = block.url;
        img.alt = block.alt || 'Page image';
        img.loading = 'lazy';
        wrap.appendChild(img);
        if (block.caption) {
          const cap = document.createElement('div');
          cap.className = 'pres-caption';
          cap.textContent = block.caption;
          wrap.appendChild(cap);
        }
        container.appendChild(wrap);
      },
      table(block, container) {
        const wrap = document.createElement('div');
        wrap.className = 'pres-block pres-table-wrap';
        if (block.title) {
          const t = document.createElement('div');
          t.className = 'pres-caption';
          t.textContent = block.title;
          wrap.appendChild(t);
        }
        const table = document.createElement('table');
        table.className = 'pres-table' + (block.interactive ? ' interactive' : '');
        const thead = document.createElement('thead');
        const hr = document.createElement('tr');
        let sortState = { col: -1, asc: true };
        let currentRows = block.rows || [];

        function renderBody() {
          tbody.innerHTML = '';
          currentRows.forEach((row, rowIdx) => {
            const tr = document.createElement('tr');
            tr.dataset.rowIdx = String(rowIdx);
            row.forEach(cell => {
              const td = document.createElement('td');
              td.textContent = cell;
              tr.appendChild(td);
            });
            if (block.interactive) {
              tr.addEventListener('mouseenter', () => {
                wrap.dispatchEvent(new CustomEvent('pres-row-hover', {
                  detail: { label: row[0] || '' },
                  bubbles: true,
                }));
              });
            }
            tbody.appendChild(tr);
          });
        }

        (block.headers || []).forEach((h, colIdx) => {
          const th = document.createElement('th');
          th.textContent = h;
          if (block.interactive) {
            th.title = 'Click to sort';
            th.addEventListener('click', () => {
              const asc = sortState.col === colIdx ? !sortState.asc : true;
              sortState = { col: colIdx, asc };
              currentRows = sortTableRows(currentRows, colIdx, asc);
              renderBody();
            });
          }
          hr.appendChild(th);
        });
        thead.appendChild(hr);
        table.appendChild(thead);
        const tbody = document.createElement('tbody');
        table.appendChild(tbody);
        renderBody();
        wrap.appendChild(table);
        container.appendChild(wrap);
      },
      chart(block, container) {
        const wrap = document.createElement('div');
        wrap.className = 'pres-block';
        if (block.title) {
          const t = document.createElement('div');
          t.className = 'pres-caption';
          t.textContent = block.title;
          wrap.appendChild(t);
        }
        const chart = document.createElement('div');
        chart.className = 'pres-chart';
        const vals = (block.values || []).map(v => Number(v)).filter(v => !Number.isNaN(v));
        const labels = block.labels || vals.map((_, i) => String(i + 1));
        if (vals.length < 2) return;

        const max = Math.max(...vals, 1);
        const trackInnerPx = 88;
        const barHues = [210, 168, 132, 95, 48, 280, 320];

        vals.forEach((v, i) => {
          const col = document.createElement('div');
          col.className = 'pres-bar-col';

          const valEl = document.createElement('div');
          valEl.className = 'pres-bar-value';
          valEl.textContent = formatChartValue(v, block);

          const track = document.createElement('div');
          track.className = 'pres-bar-track';
          const bar = document.createElement('div');
          bar.className = 'pres-bar';
          const px = Math.max(3, Math.round((v / max) * trackInnerPx));
          bar.style.height = px + 'px';
          const hue = barHues[i % barHues.length];
          bar.style.background = `linear-gradient(180deg, hsl(${hue} 70% 58%), hsl(${hue} 65% 42%))`;
          bar.title = (labels[i] || '') + ': ' + formatChartValue(v, block);
          track.appendChild(bar);

          const lbl = document.createElement('div');
          lbl.className = 'pres-bar-label';
          lbl.textContent = labels[i] || '';

          col.appendChild(valEl);
          col.appendChild(track);
          col.appendChild(lbl);
          chart.appendChild(col);
        });
        wrap.appendChild(chart);
        container.appendChild(wrap);
      },
      markdown(block, container) {
        const wrap = document.createElement('div');
        wrap.className = 'pres-block';
        renderMarkdownSimple(wrap, block.content || '');
        container.appendChild(wrap);
      },
    };

    function renderPresentation(bubble, presentation, fallbackAnswer) {
      bubble.classList.remove('plain-text');
      bubble.textContent = '';
      const blocks = (presentation && presentation.blocks) || [];
      if (!blocks.length) {
        bubble.classList.add('plain-text');
        bubble.textContent = fallbackAnswer || '(no answer)';
        return;
      }
      blocks.forEach(block => {
        const fn = BLOCK_RENDERERS[block.type];
        if (fn) fn(block, bubble);
        else {
          const pre = document.createElement('pre');
          pre.textContent = JSON.stringify(block, null, 2);
          bubble.appendChild(pre);
        }
      });
      const hasInteractive = blocks.some(b => b.interactive);
      if (hasInteractive) {
        bubble.addEventListener('pres-row-hover', (e) => {
          const label = (e.detail && e.detail.label) || '';
          bubble.querySelectorAll('.pres-bar-col').forEach(col => {
            const lbl = col.querySelector('.pres-bar-label');
            col.classList.toggle('bar-active', lbl && lbl.textContent.trim() === label.trim());
          });
          bubble.querySelectorAll('table.pres-table tbody tr').forEach(tr => {
            const first = tr.querySelector('td');
            tr.classList.toggle('row-highlight', first && first.textContent.trim() === label.trim());
          });
        });
      }
    }

    function addAssistantResponse(answer, sources, accessLevel, agent, strategy, routeTool, routeMethod, presentation, queryType) {
      const wrap = document.createElement('div');
      wrap.className = 'msg assistant';
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      if (presentation && presentation.blocks && presentation.blocks.length) {
        renderPresentation(bubble, presentation, answer);
      } else {
        bubble.classList.add('plain-text');
        bubble.textContent = answer || '(no answer)';
      }
      wrap.appendChild(bubble);
      chatBody.appendChild(wrap);

      const meta = document.createElement('div');
      meta.className = 'meta';
      const routePart = routeTool ? ` · route=${routeTool}` : '';
      const methodPart = routeMethod ? ` (${routeMethod})` : '';
      const qt = queryType ? ` · type=${queryType}` : '';
      const pk = presentation && presentation.kind ? ` · ui=${presentation.kind}` : '';
      meta.textContent = `access=${accessLevel || '-'} · agent=${agent || '-'} · strategy=${strategy || '-'}${qt}${pk}${routePart}${methodPart}`;
      bubble.appendChild(meta);

      if (sources && sources.length) {
        const details = document.createElement('details');
        const summary = document.createElement('summary');
        summary.textContent = `Sources (${sources.length})`;
        details.appendChild(summary);

        sources.slice(0, 10).forEach((s, i) => {
          const pre = document.createElement('div');
          pre.className = 'source';
          pre.textContent = JSON.stringify(s, null, 2);
          details.appendChild(pre);
        });
        if (sources.length > 10) {
          const more = document.createElement('div');
          more.className = 'source';
          more.textContent = `... ${sources.length - 10} more sources not shown`;
          details.appendChild(more);
        }
        bubble.appendChild(details);
      }
    }

    function getCtx() {
      return {
        role: document.getElementById('role').value,
        user_id: document.getElementById('user_id').value,
        department: document.getElementById('department').value || null,
        thread_id: 'default'
      };
    }

    async function send() {
      const question = q.value.trim();
      if (!question) return;
      clearError();

      addMessage('user', question);
      q.value = '';
      setStatus('Thinking…');
      sendBtn.disabled = true;

      const ctx = getCtx();
      try {
        const res = await fetch('/query', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            question,
            role: ctx.role,
            user_id: ctx.user_id,
            department: ctx.department,
            thread_id: ctx.thread_id
          })
        });

        const payloadText = await res.text();
        if (!res.ok) throw new Error(payloadText || 'Request failed');
        const payload = JSON.parse(payloadText);

        addAssistantResponse(
          payload.answer,
          payload.sources,
          payload.access_level,
          payload.agent,
          payload.strategy,
          payload.route_tool,
          payload.route_method,
          payload.presentation,
          payload.query_type
        );
        setStatus('Ready');
      } catch (e) {
        showError(e.message || String(e));
        setStatus('Error');
      } finally {
        sendBtn.disabled = false;
      }
    }

    sendBtn.addEventListener('click', send);
    q.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) send();
    });

    document.getElementById('new_chat').addEventListener('click', () => {
      chatBody.innerHTML = '';
      clearError();
      setStatus('Ready');
      addMessage('assistant', "Hi! Ask me anything — I'll answer using the Agentic Graph RAG knowledge graph and cite what I used.");
    });

    document.getElementById('ping').addEventListener('click', async () => {
      clearError();
      setStatus('Checking…');
      try {
        const res = await fetch('/health');
        const text = await res.text();
        if (!res.ok) throw new Error(text || 'Health check failed');
        setStatus('Healthy');
      } catch (e) {
        showError(e.message || String(e));
        setStatus('Error');
      }
    });

    // initial
    addMessage('assistant', "Hi! Ask me anything — I'll answer using the Agentic Graph RAG knowledge graph and cite what I used.");
  </script>
</body>
</html>
