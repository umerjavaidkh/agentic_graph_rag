# Optional MinIO for page image storage (ASSET_STORAGE_BACKEND=minio).
# Neo4j is assumed to run separately (your existing Docker setup).
services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data

volumes:
  minio_data:
